<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel ADAS GenAI</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://kit.fontawesome.com/35a58614a1.js" crossorigin="anonymous"></script>
</head>
<body>
    <main class="dashboard">
        
        <section class="panel-telemetria">
            <h2>Estado del Vehículo</h2>
            <div id="contenedor-estado">
                <p class="mensaje-sistema">Sincronizando con módulos de control...</p>
            </div>
        </section>

        <section class="panel-interaccion">
            <div class="area-voz">
                <button id="btn-microfono" class="btn-primario">Hablar al Asistente</button>
                <p id="texto-transcrito" class="texto-secundario">Sistema en espera...</p>
            </div>

            <div class="area-registro">
                <h3>Acciones del Sistema</h3>
                <ul id="lista-acciones">
                    <li>Módulos inicializados correctamente.</li>
                </ul>
            </div>
        </section>

    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/client.js"></script>
</body>
</html>
